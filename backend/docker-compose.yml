# 백엔드 배포 오케스트레이션 (backend + nginx 리버스프록시 + certbot).
# 노드에서:  docker compose up -d --build
# 내리기:    docker compose down        (데이터는 ./data, 인증서는 ./certbot 볼륨에 남음)
#
# HTTPS 부팅 순서:
#   1) up -d  → backend + nginx(HTTP 전용, api.conf)로 기동
#   2) DNS(si.leafeep.com → 노드IP) 전파 확인
#   3) ./enable-ssl.sh 실행 → certbot 인증서 발급 → api-ssl.conf 로 교체 → nginx reload
services:
  backend:
    build: .
    image: stop-island-backend
    container_name: stop-island-backend
    restart: unless-stopped
    # 외부 노출 안 함. nginx만 접근(같은 compose 네트워크의 backend:8000).
    expose:
      - "8000"
    volumes:
      - ./data:/data
    env_file:
      - .env

  nginx:
    image: nginx:1.27-alpine
    container_name: stop-island-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 활성 config 1개만 마운트. enable-ssl.sh가 이 파일 내용을 교체한다.
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  # certbot: 최초 발급은 enable-ssl.sh가 run으로 1회 실행.
  # 이 서비스는 갱신 루프(12시간마다 renew 시도)로 상주한다.
  certbot:
    image: certbot/certbot:latest
    container_name: stop-island-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
