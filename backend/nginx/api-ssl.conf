# 인증서 발급 후 버전: 80→443 리다이렉트 + 443 TLS 종단 → backend:8000.
# enable-ssl.sh 가 이 내용을 api.conf 로 복사하고 nginx reload 한다.
server {
    listen 80;
    server_name si.leafeep.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name si.leafeep.com;

    ssl_certificate     /etc/letsencrypt/live/si.leafeep.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/si.leafeep.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
