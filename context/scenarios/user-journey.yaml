# 유저 여정 — Given/When/Then 상속 트리 (YAML)
#
# 스키마:
#   노드(node):  { id, title, given?, note?, children? | scenarios? }
#     - given: 이 노드에서 "추가"되는 전제 목록. 조상 노드의 given을 전부 상속받아 누적된다.
#     - children: 하위 여정 노드
#     - scenarios: 잎 시나리오 목록
#   시나리오(scenario): { id, title, given?, when, then, refs?, status? }
#     - given: 이 시나리오에서만 추가되는 전제 (조상 given에 누적)
#     - then: 결과 목록 (And 포함)
#     - refs: 상세 기술 명세(01~07-*.md)의 시나리오 ID — 기술 레벨 전체 조건은 그쪽 참조
#     - status: 구현 마킹
#         done = 백엔드(pytest)+프론트(vitest/build) 구현 완료, 실API 계약 정합 검증됨
#         (없음) = 설계는 확정됐으나 아직 완전히 구현되지 않음
#
# ※ 이 트리는 "구현된 웹 플로우"를 단일 진실로 삼아 다시 쓰였다(2026-07-19).
#   좌석별 QR 게이트(D-26) · 재진입(D-28) · 무알림 자동만료(D-27) · 영수증 확인/최소금액(D-29)을 반영한다.
# ※ status가 비어 있는(미마킹) 부분은 "화면은 있으나 백엔드가 아직"인 것들이다:
#     - 영수증을 "이거 맞아요?"로 되묻는 2단계(recognized/confirm) OCR 아키텍처(J2.1a)
#     - 사업자등록번호로 가게를 알아보는 매칭(J2.1a에 포함)
#     - 최소 결제금액 미달 거부(J2.1b-4)
#   위 세 가지는 현재 프론트 시뮬레이션 상태다 — 실 OCR 2회 호출·금액 판정 백엔드는 후속 작업(Tom).
#   그 외(게이트·도착·프로그레스·확정·완료·재진입·방명록·관리자·현황)는 전부 구현+검증 완료.
#
# 언어 규칙: 손님이 겪는 말로만 쓴다. (localStorage → "폰이 기억한다", pending → "확인 중")

meta:
  project: "멈춰, 섬!"
  purpose: 유저 관점 전체 기능 흐름 — 비개발자용 진입점. 구현된 웹 플로우를 그대로 반영
  detail_spec: 00-overview.md 결정표(D-00~D-29) + 01~07 상세 시나리오
  one_liner: 자리마다 QR. 찍으면 도착 → 영수증 1장으로 인증 → 이 자리 확정. 방명록은 누구나.

journey:
  id: J0
  title: 공통 배경 — 모든 시나리오의 뿌리
  given:
    - 2026년 9/30~10/6, 행궁동 공방거리 팝업 라운지. 좌석은 A1~B3 여섯 개
    - 손님은 폰 브라우저로 이용한다 — 앱 설치 없음, 로그인 없음, 이름도 안 물어봄
    - '자리마다 고유 QR이 붙어 있다. 서비스는 오직 그 QR로만 시작된다 — QR 없이 들어오면 "QR을 찍어 시작하세요" 안내뿐' # D-26
    - 공간은 무인으로 운영된다 — 운영진은 현장에 없고 원격으로만 지켜본다. 모든 절차는 그 자리에서 즉시 끝난다
    - '"나"라는 구분은 폰(브라우저)이 조용히 기억한다. 폰을 바꾸면 새 손님으로 취급' # SYS-301, SYS-303
    - "규칙은 단 하나: 참여 상점의 오늘 영수증 1장 = 오늘 하루 이 자리 이용권"

  children:
    # ──────────────────────────────────────────────
    - id: J1
      title: 발견 — QR 게이트를 지나 내 자리에 도착
      given:
        - 거리에서 자리마다 붙은 QR 코드를 발견했다 # 자리 = QR (D-26)
      children:
        - id: J1.1
          title: QR 게이트 — 자리 QR로만 들어올 수 있다
          note: "QR 없이 사이트에 들어오면 메인·예약·방명록이 아예 안 보이고 온보딩만 뜬다. 유일한 다음 행동은 '자리 QR 스캔'."
          scenarios:
            - id: J1.1-1
              status: done
              title: QR 없이 들어오면 온보딩만
              given: 주소창 직접 입력·공유 링크 등으로 자리 QR 없이 사이트를 열었다 (예약 보유도 아님)
              when: 사이트가 뜬다
              then:
                - '풀스크린으로 "테이블의 QR을 찍어 시작해주세요"만 보인다'
                - 현황·[이 자리 잡기]·방명록·햄버거 메뉴는 전부 숨겨진다 — 조작할 게 없다
                - 실제 다음 행동은 하나뿐, 앉고 싶은 자리의 QR을 폰으로 찍는 것
              refs: [MAIN-701, MAIN-704]
            - id: J1.1-2
              status: done
              title: 예약 보유자는 QR 없이 열어도 통과
              given: 방금 어느 자리를 예약했다 (폰이 그 예약을 기억한다)
              when: QR 없이 사이트를 다시 연다 (앱 재오픈·공유 링크)
              then:
                - 게이트에 막히지 않고 바로 "이용 중" 화면으로 — 자기 예약을 잃지 않는다
                - 예약이 이미 끝났으면 조용히 정리하고 "QR을 다시 찍어주세요"로 안내
              refs: [MAIN-703]
        - id: J1.2
          title: 도착 — 자리 QR을 찍으면 열리는 첫 화면
          given:
            - 앉고 싶은 자리(예: A3)의 QR을 찍어 `/#/?seat=a3`로 들어왔다
          scenarios:
            - id: J1.2-1
              status: done
              title: 도착 화면이 뜬다
              when: 화면이 열린다
              then:
                - '"QR 스캔 완료" 배지 + "당신의 자리 · A3"(크게) + "4인석 · 창가 자리"'
                - 화면 위쪽에 흐름 프로그레스가 뜬다 — 자리 → 인증 → 예약 → 착석 (지금은 "자리" 단계)
                - '[이 자리 잡기] 버튼을 누르면 갈림길 없이 곧바로 영수증 인증으로 간다'
                - 아래에 "지금 빈 자리 N석 · 오늘 N명 방문" 현황 한 줄 (30초마다 저절로 갱신)
              refs: [MAIN-601, MAIN-702, MAIN-801, MAIN-401]
            - id: J1.2-2
              status: done
              title: 지금 만석이어도 이 자리는 잡을 수 있다
              given: 전체는 만석이지만 내가 찍은 자리 A3 자체는 비어 있다
              when: 도착 화면을 본다
              then:
                - '현황 한 줄은 "빈 자리 0석"이라 해도 [이 자리 잡기]는 그대로 눌린다'
                - "인증을 미리 해두고 이 자리를 잡으라는 뜻 — 인증과 자리 점유는 별개"
              refs: [MAIN-203, MAIN-405]
            - id: J1.2-3
              status: done
              title: 신호가 나쁨
              given: 골목이라 데이터가 잘 안 터진다
              when: 도착 화면이 열린다
              then:
                - 자리 라벨·값 문구·버튼은 멀쩡히 보인다
                - 현황 한 줄만 "현황을 불러오지 못했어요"였다가 신호가 돌아오면 저절로 채워진다
                - 화면 전체가 죽는 일은 없다
              refs: [MAIN-204, MAIN-205, MAIN-501, MAIN-502]
            - id: J1.2-4
              status: done
              title: 내가 찍은 자리가 이미 사용 중
              given: 찍은 자리 A3에 이미 다른 사람 예약이 있거나(사용 중) 오늘 안 여는 자리다(운영 중지)
              when: 도착 화면이 열린다
              then:
                - '"이 자리(A3)는 지금 사용 중이에요" + "지금 N석 비어 있어요 — 빈 자리의 QR을 찍어주세요"'
                - '[이 자리 잡기] 버튼은 안 보인다 — 다른 빈자리는 그 자리 QR을 찍어야 잡을 수 있다'
              refs: [MAIN-602]
            - id: J1.2-5
              status: done
              title: 구석구석 둘러보기
              when: 오른쪽 위 햄버거 메뉴(≡)를 누른다
              then:
                - 서랍이 열리고 메인 / 메뉴 선택 / 방명록으로 바로 갈 수 있다
                - 인증·예약 화면은 서랍에 없다 — 예약 흐름 안에서만 나온다
              refs: [MAIN-403, MAIN-802]
        - id: J1.3
          title: 갈림길(메뉴 선택) — 이제 주 흐름 밖, 햄버거로만 온다
          note: "도착 화면 CTA가 인증으로 직행하면서 예약 퍼널에서 빠졌다. 이 화면은 햄버거 메뉴로만 도달한다(둘러보기용)."
          given:
            - 햄버거 메뉴에서 "메뉴 선택"으로 들어왔다 # MAIN-403 — 도착 CTA는 여기를 건너뛴다
          scenarios:
            - id: J1.3-1
              status: done
              title: 두 갈래를 본다
              when: 화면이 열린다
              then:
                - "[테이블 예약 — 영수증 인증 후 이 자리 예약] / [방명록 작성 — 후기·맛집 공유] 카드 2개"
                - 아래에 참여 상점 배지("막걸리계보", "조준영 목공방" … +12개) — 어디서 사 먹으면 되는지 여기서 알 수 있다
              refs: [MENU-101, MENU-301]
            - id: J1.3-2
              status: done
              title: 카드를 누르면 바로 이동
              when: 카드를 누른다
              then:
                - 고르고 확인하는 단계 없이 즉시 다음 화면으로
                - "[테이블 예약] → 영수증 인증 / [방명록 작성] → 방명록 (방명록은 인증 불필요)"
              refs: [MENU-201, MENU-202]
            - id: J1.3-3
              status: done
              title: 상점 목록이 안 뜸
              given: 상점 정보를 못 불러왔다 (준비 전이거나 오류)
              when: 화면이 열린다
              then:
                - '"참여 상점을 준비 중이에요" 또는 "불러오지 못했어요"만 그 자리에 표시'
                - 예약·방명록 카드는 정상 동작한다
              refs: [MENU-303, MENU-304]

    # ──────────────────────────────────────────────
    - id: J2
      title: 이 자리 잡기 — 인증부터 확정까지
      given:
        - 도착 화면에서 [이 자리 잡기]를 눌러 영수증 인증 화면에 왔다 (메뉴 갈림길은 건너뜀) # MAIN-401
        - "화면 구성: 안내문 + 사진 올리는 박스 + \"또는 상점 직접 선택\" 드롭다운 + [인증하기] + \"인증은 하루 1회만 가능합니다\""
      children:
        - id: J2.1
          title: 영수증 사진으로 인증
          given:
            - 오늘 참여 상점에서 결제한 영수증이 손에 있다
          children:
            - id: J2.1-upload
              title: 사진 올리기 자체
              scenarios:
                - id: J2.1-1
                  status: done
                  title: 찍거나 고르거나
                  when: 박스를 누른다
                  then:
                    - 카메라로 바로 찍거나 갤러리에서 고를 수 있다
                    - 올리면 박스 안에 미리보기. X를 누르면 지우고 다시 올릴 수 있다
                  refs: [VF-201, VF-206, VF-207]
                - id: J2.1-2
                  status: done
                  title: 안 받아주는 파일
                  when: 사진이 아닌 파일, 10MB 넘는 사진, 깨진 파일, 아이폰 HEIC를 올린다
                  then:
                    - 서버로 보내기도 전에 그 자리에서 "JPG/PNG, 10MB 이하만 가능해요"류 안내
                  refs: [VF-202, VF-203, VF-204, VF-205]
            - id: J2.1a
              title: 잘 읽히면 — "이거 맞아요?" 되묻고 확인받는다
              note: "이 확인 단계(recognized/confirm)와 사업자번호로 가게를 알아보는 매칭은 화면상 설계·구현됐으나 실 OCR 2회 호출 백엔드는 아직 — 현재 프론트 시뮬레이션. 그래서 status 미마킹."
              given:
                - 올린 영수증이 잘 읽혔다 (가게·결제 일시·금액·승인번호를 뽑아냄)
              scenarios:
                - id: J2.1a-1
                  title: 읽은 정보를 보여주고 확인받는다
                  when: "[인증하기]를 누르고 몇 초 기다린다"
                  then:
                    - '바로 통과시키지 않고 "이거 맞아요?" 확인 화면을 띄운다 — 가게(상호명) · 결제 일시(시간까지) · 결제 금액 · 승인번호 뒷자리'
                    - '가게는 영수증의 사업자등록번호로 정확히 알아본다 (상호명 표기가 흔들려도 맞게 잡음)'
                    - '[네, 맞아요 · 인증하기] / [아니요, 직접 선택할게요] 두 버튼'
                  refs: [VF-301, VF-304]
                - id: J2.1a-2
                  title: "[네, 맞아요] → 인증 완료 → 예약으로"
                  when: "\"네, 맞아요\"를 누른다"
                  then:
                    - 인증이 확정되고 곧바로 "이 자리 예약하기" 확정 화면으로 넘어간다
                    - 상단에 "{가게} 영수증 인증 완료" 배너. 이 인증은 폰이 기억한다 — 오늘 안에는 다시 할 필요 없다
                  refs: [VF-302]
                - id: J2.1a-3
                  title: "[아니요] → 직접 선택으로"
                  given: OCR이 읽은 가게가 실제와 다르다고 판단했다
                  when: "\"아니요, 직접 선택할게요\"를 누른다"
                  then:
                    - 확인 화면을 닫고 상점 직접 선택으로 넘어간다 (→ J2.2)
                  refs: [VF-303]
            - id: J2.1b
              title: 거절당함 — 영수증 자체가 자격 미달 (확인 없이 즉시 거부)
              given:
                - 올린 영수증에 문제가 있다
              note: "공통 결과: 이유가 화면에 뜨고, 사진은 남아 있고, 몇 번이든 재시도 가능 (거절은 하루 1회에 안 쳐진다) [VF-409]"
              scenarios:
                - id: J2.1b-1
                  status: done
                  title: 어제(옛날) 영수증
                  when: 인증한다
                  then: ['"오늘 결제한 영수증만 인정돼요 (영수증 날짜: …)"']
                  refs: [VF-401]
                - id: J2.1b-2
                  status: done
                  title: 참여 안 하는 가게
                  given: 프랜차이즈 등 목록에 없는 가게 영수증
                  when: 인증한다
                  then: ['"참여 상점의 영수증이 아니에요" — 참여 상점 목록을 다시 안내']
                  refs: [VF-402]
                - id: J2.1b-3
                  status: done
                  title: 이미 쓴 영수증
                  given: 나 또는 친구가 이미 이 영수증으로 인증했다 (공유받은 사진 포함)
                  when: 인증한다
                  then: ['"이미 사용된 영수증이에요" — 각도를 바꿔 다시 찍어도 승인번호로 같은 결과']
                  refs: [VF-403, VF-404, SYS-502]
                - id: J2.1b-4
                  title: 금액이 너무 적음
                  given: 참여 상점 당일 영수증이지만 결제 금액이 최소 결제금액(📌 5,000원) 미만
                  when: 인증한다
                  then:
                    - '확인 화면 없이 "최소 결제금액(5,000원) 이상 영수증만 인정돼요"'
                    - "소액 결제로 자리를 점유하는 어뷰징을 막는 장치 (금액값·상점별 차등은 서버 설정)"
                  refs: [VF-410]
            - id: J2.1c
              title: 다시 찍어달래 — 못 읽으면 상점 직접 선택으로 유도
              scenarios:
                - id: J2.1c-1
                  status: done
                  title: 영수증이 아닌 사진
                  when: 풍경/셀카 등을 올리고 인증한다
                  then:
                    - '"영수증 사진이 아닌 것 같아요"'
                    - "재촬영도 되지만, 결제한 상점을 직접 고를 수도 있게 안내한다 (→ J2.2)"
                  refs: [VF-405]
                - id: J2.1c-2
                  status: done
                  title: 흐릿해서 가게 이름을 못 읽음
                  when: 인증한다
                  then:
                    - '"영수증을 잘 못 읽었어요. 결제한 참여 상점을 골라주세요" — 상점 직접 선택으로 전환 (→ J2.2)'
                  refs: [VF-406]
            - id: J2.1d
              title: 시스템이 아픔 — 자동 판독 불가
              scenarios:
                - id: J2.1d-1
                  status: done
                  title: 판독 서비스 장애
                  given: 자동 판독이 계속 실패한다 (외부 서비스 문제)
                  when: 인증을 시도한다
                  then:
                    - '"사진 인증이 지금 어려워요. 아래에서 상점을 직접 선택해주세요"'
                    - J2.2로 자연스럽게 갈아탄다 — 장애 중에도 사람 기다림 없이 완결
                  refs: [VF-701, VF-702, SYS-704]
                - id: J2.1d-2
                  status: done
                  title: 내 신호가 끊김
                  when: 올리는 도중 데이터가 끊긴다
                  then: ['"네트워크 연결을 확인해주세요" — 사진은 남아 있어서 버튼만 다시 누르면 된다']
                  refs: [VF-704]
        - id: J2.2
          title: 가게 직접 고르기 (사진 없이 가는 폴백)
          given:
            - 사진 인증이 안 되거나, 확인 화면에서 [아니요]를 눌렀거나, 처음부터 직접 고르고 싶다
          scenarios:
            - id: J2.2-1
              status: done
              title: 직접 선택 → 바로 통과
              when: 드롭다운에서 가게를 고르고 "이 상점으로 인증"을 누른다
              then:
                - 확인 화면·기다림 없이 바로 "이 자리 예약하기" 확정 화면으로 — 무인 공간이라 눈앞 확인 절차가 없다
                - 다만 이 방식은 전부 "확인 필요"로 기록되어 운영진이 사후에 들여다본다
              refs: [VF-601]
            - id: J2.2-2
              status: done
              title: 거짓 선택의 뒤탈
              given: 실제로는 아무것도 사지 않고 가게만 골라 통과했다
              when: 운영진이 원격 감사에서 어뷰징으로 판정한다
              then:
                - 인증이 무효 처리되고 잡아둔 예약도 풀린다 — 억울하면 진짜 영수증으로 다시 인증하면 된다
                - 무료 좌석 7일 팝업 — 시스템은 관용적이지만 기록은 남는다
              refs: [VF-504, ADM-212, SYS-505]
            - id: J2.2-3
              status: done
              title: 아무것도 안 하고 인증 누름
              when: 사진도 없고 가게도 안 고르고 [인증하기]
              then: ['"영수증 사진을 올리거나 상점을 선택해주세요" — 버튼이 애초에 안 눌린다']
              refs: [VF-604]
        - id: J2.3
          title: 하루 1번 규칙
          given:
            - 인증의 "성공"은 하루에 1번만 쳐준다 (실패·재시도는 무제한)
          scenarios:
            - id: J2.3-1
              status: done
              title: 이미 인증한 날 다시 오면
              when: 오늘 인증을 이미 성공한 상태로 인증 화면에 다시 온다
              then:
                - '업로드 폼 대신 "오늘 인증 완료" 상태 화면'
                - "[좌석 선택으로] 버튼으로 바로 진행. 두 번 인증할 필요도, 방법도 없다"
              refs: [VF-102, VF-801, MENU-205]
            - id: J2.3-2
              status: done
              title: 밤 12시가 지나면
              when: 자정(한국 시간)이 넘는다
              then: [어제의 인증은 끝. 오늘 영수증으로 새로 인증해야 한다]
              refs: [VF-803, VF-103]
        - id: J2.4
          title: 이 자리 확정 — 고르는 게 아니라 찍은 자리를 확정한다
          given:
            - 인증을 통과해 예약 화면에 왔다. 상단에 "{가게} 영수증 인증 완료" 배너
            - 화면엔 내가 찍은 자리 하나만 나온다 — 그리드에서 고르는 게 아니다 (자리 = QR, D-26)
          scenarios:
            - id: J2.4-1
              status: done
              title: 내가 찍은 자리 하나가 보인다
              when: 화면을 본다
              then:
                - '그리드가 아니라 내가 찍은 자리 하나만 나온다 — "A3 · 4인석 · 창가 자리" + [이 자리(A3) 예약하기]'
                - 이 자리 상태도 30초마다 저절로 최신으로 바뀐다
              refs: [RSV-201, RSV-401]
            - id: J2.4-2
              status: done
              title: 이 자리가 사용 중이면
              given: 내가 찍은 자리 A3가 이미 사용 중이거나 운영 중지 상태다
              when: 화면을 본다
              then:
                - '"이 자리(A3)는 지금 사용 중이에요" + 전체 빈 자리 현황 + "빈 자리의 QR을 찍어주세요"'
                - '[이 자리 예약하기] 버튼은 안 나온다 — 다른 자리로 갈아타려면 그 자리 QR을 찍어야 한다'
              refs: [RSV-202, RSV-203]
            - id: J2.4-3
              status: done
              title: 확정 성공
              given: 내가 찍은 자리가 비어 있어 예약할 수 있다
              when: "[이 자리(A3) 예약하기]를 누른다"
              then: [예약 완료 화면이 뜬다 — 내 자리 확정 (→ J3)]
              refs: [RSV-501]
            - id: J2.4-4
              status: done
              title: 찰나의 차이로 패배
              given: 다른 손님이 같은 A3 QR을 찍고 거의 동시에 확정을 눌렀다
              when: 확정을 누른다
              then:
                - 한 명만 성공한다
                - '진 쪽은 "아쉽지만 방금 다른 분이 먼저 예약했어요" + "다른 빈 자리의 QR을 찍어주세요"(다시 고르는 그리드는 없다)'
              refs: [RSV-502, RSV-406, SYS-401]
            - id: J2.4-5
              status: done
              title: 버튼 연타 / 응답이 안 옴
              when: 급해서 두 번 누르거나, 눌렀는데 신호가 끊겨 결과를 못 받았다
              then:
                - 예약이 두 개 생기는 일은 절대 없다
                - 다시 누르면 "이미 예약돼 있네요" 하고 내 완료 화면을 보여준다
              refs: [RSV-504, RSV-505, RSV-506]
            - id: J2.4-6
              status: done
              title: 밤 12시를 넘겨버림
              given: 예약 화면을 켜둔 채 자정이 지났다
              when: 확정을 누른다
              then: ['"인증이 만료되었어요. 오늘 영수증으로 다시 인증해주세요"']
              refs: [RSV-503]
            - id: J2.4-7
              status: done
              title: 순서·자리를 건너뛰려 하면
              when: 링크 공유 등으로 예약 화면 주소에 직접 들어간다
              then:
                - 인증을 안 했으면 인증 화면으로 돌려보낸다
                - '인증은 했어도 좌석 QR 맥락이 없으면(공유 링크) "현장 좌석의 QR을 찍어주세요"로 안내한다'
                - 순서도 자리도 건너뛸 수 없다
              refs: [RSV-101, RSV-103, RSV-106]

    # ──────────────────────────────────────────────
    - id: J3
      title: 내 자리에서 — 이용, 떠나기, 다시 오기
      given:
        - "예약 완료 화면이 떠 있다: \"A3 · 4인석 · 창가 자리 / 16:42까지 이용 가능 (남은 시간 1시간 58분)\" + [자리 비우기] [방명록 쓰기]"
      children:
        - id: J3.1
          title: 완료 화면이 기대치를 알려준다
          scenarios:
            - id: J3.1-1
              status: done
              title: 자동 정리 · 알림 없음 · 다시 잡기 가능
              when: 완료 화면을 본다
              then:
                - '자리·인원·만료 시각·남은 시간이 보이고, 아래에 3줄 안내: "시간이 되면 자동으로 정리돼요 · 따로 알림은 가지 않아요 · 시간 안에 다시 잡을 수 있어요"'
                - "이게 유일한 고지다 — 나가는 손님에게 '곧 종료' 문자·푸시는 보내지 않는다 (무알림 자동 만료, D-27)"
                - 화면은 본인 확인용이다. QR·종이 티켓 없음 — 무인 공간이라 제시할 상대가 없다
              refs: [RSV-601]
        - id: J3.2
          title: 내 자리 확인은 셀프
          scenarios:
            - id: J3.2-1
              status: done
              title: 자리가 겹쳤을 때
              given: 무인 공간이라 지켜보는 사람이 없고, 누가 내 예약 자리에 앉아 있다
              when: 이 화면(좌석 라벨·이용 시간)을 보여주며 양해를 구한다
              then:
                - 화면이 내 자리의 근거가 된다 — 검사 없는 명예 시스템
                - 정리가 안 되면 다른 빈자리를 예약하면 된다 (자리 비우기 → 재예약)
              refs: [RSV-601]
            - id: J3.2-2
              status: done
              title: 폰을 닫았다 켜도
              when: 브라우저를 닫거나 폰을 껐다가 다시 들어온다
              then:
                - 메인이 "이용 중 · A3 · [내 자리 보기]"를 최우선으로 보여준다
                - 증빙을 잃지 않는다
              refs: [MAIN-301, RSV-607, MAIN-505]
        - id: J3.3
          title: 시간은 2시간 (알림 없이 자동 만료)
          scenarios:
            - id: J3.3-1
              status: done
              title: 시간이 다 되면
              when: 남은 시간이 0이 된다
              then:
                - 화면이 "이용 시간이 끝났어요"로 바뀌고 자리는 다음 사람에게 풀린다
                - 별도 벌칙·사전 알림 없음 + "오늘 다시 예약할 수 있어요"
              refs: [RSV-604, SYS-101, SYS-102]
            - id: J3.3-2
              status: done
              title: 밤에 걸쳐 앉아 있으면
              given: 밤 11시에 예약했다
              when: 자정이 지난다
              then: [예약된 2시간(새벽 1시까지)은 보장된다 — 끊기지 않는다]
              refs: [SYS-203]
        - id: J3.4
          title: 일찍 일어나기 — 자리 비우기와 재예약
          scenarios:
            - id: J3.4-1
              status: done
              title: 자리 비우기
              when: "[자리 비우기] → \"자리를 비울까요? 예약이 취소돼요\" → [비우기]"
              then:
                - '"이용해주셔서 감사해요"와 함께 메인으로'
                - 자리는 즉시 다음 사람에게 풀린다
              refs: [RSV-602, RSV-603]
            - id: J3.4-2
              status: done
              title: 이따가 또 오고 싶으면
              given: 아까 자리를 비웠다 (또는 2시간이 끝났다)
              when: 빈 자리의 QR을 다시 찍어 예약 흐름에 들어간다
              then:
                - 재인증 없이 "오늘 인증 완료" 상태에서 바로 이 자리 확정으로
                - 오늘 영수증 하나로 하루 종일 몇 번이든 (단, 동시에 한 자리만)
              refs: [RSV-701, RSV-702]
            - id: J3.4-3
              status: done
              title: 남의 예약은 못 건드림
              when: 누가 내 예약 링크를 알아내 자기 폰에서 취소를 시도한다
              then: [안 된다. 예약은 만든 폰에서만 보이고 취소된다]
              refs: [RSV-801, RSV-802]
        - id: J3.5
          title: 다시 들어왔을 때 — 재진입 (D-28)
          scenarios:
            - id: J3.5-1
              status: done
              title: 이용 중에 다시 들어오면
              given: 내 active 예약(A3)이 있다
              when: 자리 QR 재스캔이나 앱 재오픈으로 다시 들어온다
              then:
                - '무엇보다 먼저 "이용 중 · A3 · [내 자리 보기]"가 뜬다'
                - 도착 화면·잡기 CTA는 그리지 않는다 — 이미 이용 중이니까
              refs: [RSV-901, MAIN-301]
            - id: J3.5-2
              status: done
              title: 이용 중에 다른 자리 QR을 찍으면
              given: 내 active 예약(A3)이 있는데 다른 빈 자리 B1의 QR을 찍었다
              when: 사이트가 열린다
              then:
                - '"이용 중 · A3" 화면 그대로, "한 번에 한 자리만 이용할 수 있어요 — 옮기려면 지금 자리를 비운 뒤 그 자리 QR을 다시 찍어주세요"'
                - 새 예약은 만들어지지 않는다 (한 번에 한 자리)
              refs: [RSV-902, MAIN-302]
            - id: J3.5-3
              status: done
              title: 이용이 끝난 뒤 다시 오면
              given: 직전 예약이 만료·취소로 끝났고, 오늘 토큰은 아직 유효하다
              when: 자리 QR로 다시 들어온다
              then:
                - '도착 화면 위에 "이전 이용이 끝났어요 · 이 자리를 다시 잡을 수 있어요" 안내'
                - '[이 자리 잡기] → "오늘 인증 완료"로 통과 → 재인증 없이 재예약'
              refs: [RSV-903, MAIN-303]
            - id: J3.5-4
              status: done
              title: 이용도 끝나고 토큰도 만료됐으면
              given: 직전 예약이 끝났고 자정이 지나 토큰까지 만료됐다
              when: 자리 QR로 다시 와 예약을 시도한다
              then:
                - '"이전 이용이 끝났어요" 안내는 뜨지만, 예약하려면 오늘 영수증으로 다시 인증해야 한다'
                - "영수증 하나 = 하루 이용권"
              refs: [RSV-904]

    # ──────────────────────────────────────────────
    - id: J4
      title: 방명록 — 누구나, 익명으로
      given:
        - 방명록 화면에 왔다 (메인/갈림길/예약 완료 어디서든 진입. 인증·예약 안 했어도 됨)
      children:
        - id: J4.1
          title: 읽기
          scenarios:
            - id: J4.1-1
              status: done
              title: 구경
              when: 목록을 본다
              then:
                - '"익명 방문자 · 10분 전" 카드들이 최신순'
                - 내리면 10개씩 계속. 끝에 도달하면 더 안 나온다
              refs: [GB-501, GB-504, GB-505, GB-507]
            - id: J4.1-2
              status: done
              title: 아직 아무도 안 썼으면
              when: 목록이 빈 채로 열린다
              then: ['"아직 등록된 방명록이 없어요" — 첫 글의 주인공이 되라는 뜻']
              refs: [GB-502]
            - id: J4.1-3
              status: done
              title: 안 불러와지면
              when: 목록 로딩이 실패한다
              then: ['"불러오지 못했어요" + [다시 시도]']
              refs: [GB-503]
        - id: J4.2
          title: 쓰기
          given:
            - "위쪽 입력창에 쓸 참이다. placeholder: \"오늘 카페 A에서 커피 사고 여기서 책 읽었어요…\""
          scenarios:
            - id: J4.2-1
              status: done
              title: 기본 글
              when: 내용을 쓰고(최대 500자, 글자수 카운터 보임) [게시하기]
              then:
                - '"익명 방문자"로 즉시 목록 맨 위에 뜬다'
                - 입력창은 비워진다
              refs: [GB-101, GB-104, GB-401]
            - id: J4.2-2
              status: done
              title: 별점 곁들이기 (선택)
              when: "[별점 추가] → 별 1~5개 중 탭"
              then:
                - 글에 별점이 함께 저장된다
                - 선택한 별을 다시 누르면 별점 없이 글만
              refs: [GB-201, GB-202, GB-203]
            - id: J4.2-3
              status: done
              title: 맛집 태그 곁들이기 (선택)
              when: "[맛집 추가] → 참여 상점 목록에서 고른다 (최대 5개)"
              then:
                - 고른 가게가 칩으로 붙는다. 칩의 X로 뺄 수 있다
                - 6개째는 "맛집 태그는 5개까지 붙일 수 있어요"
              refs: [GB-301, GB-302, GB-303, GB-304]
            - id: J4.2-4
              status: done
              title: 안 되는 것들
              when: 빈 글/공백만 · 연속 도배 · 게시 실패 · 코드 장난을 각각 시도한다
              then:
                - 빈 글/공백만 → 게시 버튼이 안 눌린다
                - 방금 쓰고 또 바로 쓰면 → "잠시 후 다시 써주세요" (1분에 1개)
                - 게시가 실패하면 → 쓴 내용은 그대로. 다시 누르면 됨
                - 코드를 써넣어도 글자로만 보인다. 화면을 깨뜨릴 수 없다
              refs: [GB-102, GB-103, GB-403, GB-402, GB-601, SYS-503]
            - id: J4.2-5
              status: done
              title: 지워질 수도 있다
              given: 욕설·광고를 썼다
              when: 운영진이 발견한다
              then: [운영진이 지운다. 지워진 글은 모두의 목록에서 사라진다]
              refs: [GB-603, ADM-501]

    # ──────────────────────────────────────────────
    - id: J5
      title: 하루의 끝, 다음 날
      given:
        - 어제 이 서비스를 썼던 손님이다
      scenarios:
        - id: J5-1
          status: done
          title: 자정이 넘으면 전부 리셋
          when: 밤 12시(한국 시간)가 지난다
          then:
            - 어제의 인증은 소멸, "오늘 방문" 카운트는 0부터
            - 진행 중이던 예약 2시간만 예외적으로 보장 (J3.3-2)
          refs: [SYS-201, SYS-204, MAIN-504]
        - id: J5-2
          status: done
          title: 다음 날 다시 오면
          when: 오늘 또 참여 상점에서 사 먹고 영수증으로 인증한다
          then:
            - J2가 처음부터 다시 — 매일의 소비가 매일의 이용권이 되는 순환
            - 이게 이 서비스가 상권에 주는 선물이다
          refs: [VF-803]

    # ──────────────────────────────────────────────
    - id: J6
      title: 무대 뒤 — 운영진 (원격 모니터링)
      given:
        - 나는 행쇼 운영진이다. 현장이 아닌 곳에서 폰/노트북으로 관리자 화면에 로그인했다 — 공간은 무인 # ADM-101
      scenarios:
        - id: J6-1
          status: done
          title: 사후 감사 — 통과시킨 것들을 뒤에서 확인
          when: '"확인 필요" 목록을 훑는다 (영수증 사진 + 자동 판독이 왜 애매했는지 표시)'
          then:
            - 문제없으면 넘기고, 가짜로 판정하면 그 인증을 무효화한다
            - 무효화하면 연결된 예약도 풀린다 — 손님 플로우를 막은 적은 한 번도 없다 (선통과·후정리)
            - 운영진 둘이 동시에 같은 건을 처리해도 한 번만 반영된다
          refs: [ADM-201, ADM-211, ADM-212, ADM-213, VF-504]
        - id: J6-2
          status: done
          title: 원격 자리 운영
          when: 비 예보를 보고 B열을 원격으로 닫거나, 오래 방치된 자리를 수동으로 푼다
          then:
            - 닫은 자리는 손님 화면에 "운영 중지"로 보인다
            - 푼 자리는 즉시 예약 가능해진다
          refs: [ADM-301, ADM-402, ADM-404, RSV-203]
        - id: J6-3
          status: done
          title: 청소와 현황
          when: 부적절한 방명록을 지우고, 상점을 추가/수정하고, 오늘 통계를 본다
          then:
            - 삭제된 글은 모두의 목록에서 사라진다
            - 통계에 오늘 방문·인증·좌석 현황이 보인다
          refs: [ADM-501, ADM-601, ADM-701]

